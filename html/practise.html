<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">

        <h1>Student Marks Calculator</h1>

        <input type="text" id="sname" placeholder="Enter Student Name">

        <input type="number" id="sregno" placeholder="Enter Register Number">

        <input type="text" id="sbname" placeholder="Enter Subject Name">

        <input type="number" id="s1marks" placeholder="Enter 1st Internal Marks">

        <input type="number" id="s2marks" placeholder="Enter 2nd Internal Marks">

        <button id="btn">GENERATE MARKS</button>

        <div id="result"></div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
